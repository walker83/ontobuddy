<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>{{TITLE}} — myonto graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f8f9fa; }
  #header { padding: 8px 16px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 12px; }
  #header h1 { font-size: 14px; font-weight: 600; margin: 0; color: #333; }
  #header .stat { font-size: 12px; color: #666; }
  #network { width: 100%; height: calc(100vh - 50px); background: #fff; }
  #status { position: absolute; bottom: 8px; right: 12px; font-size: 11px; color: #888; background: rgba(255,255,255,0.85); padding: 2px 8px; border-radius: 3px; }
</style>
</head>
<body>
<div id="header">
  <h1>{{TITLE}}</h1>
  <span class="stat" id="stat">— 节点 / — 边</span>
  <span class="stat" id="hint">拖拽节点、滚轮缩放、悬停看详情</span>
</div>
<div id="network"></div>
<div id="status">由 myonto 生成</div>
<script>
(function() {
  const data = {{DATA}};
  const container = document.getElementById('network');
  const options = {
    nodes: {
      shape: 'dot',
      size: 16,
      font: { size: 12, color: '#222' },
      borderWidth: 1.5
    },
    edges: {
      width: 1,
      color: { color: '#bbb', highlight: '#444', hover: '#666' },
      font: { size: 10, color: '#666', strokeWidth: 0, align: 'middle' },
      arrows: { to: { enabled: true, scaleFactor: 0.6 } },
      smooth: { type: 'continuous' }
    },
    groups: {
      class: { color: { background: '#fff3b0', border: '#c4a700' }, shape: 'box', size: 22, font: { color: '#5c4a00', size: 13, weight: 'bold' } }
    },
    physics: {
      stabilization: { iterations: 200 },
      barnesHut: { gravitationalConstant: -8000, springLength: 120, springConstant: 0.04 }
    },
    interaction: { hover: true, tooltipDelay: 100, navigationButtons: true, keyboard: true }
  };
  // 给非 class 节点基于 group 名分配颜色（哈希到 8 种柔和色）。
  const palette = ['#a8d5e2','#fbb4ae','#b3cde3','#ccebc5','#decbe4','#fed9a6','#ffffcc','#e5d8bd'];
  const seen = new Set(['class']);
  for (const n of data.nodes) {
    if (!n.group || seen.has(n.group)) continue;
    seen.add(n.group);
  }
  let gi = 0;
  for (const g of seen) {
    if (g === 'class') continue;
    options.groups[g] = { color: { background: palette[gi % palette.length], border: '#888' } };
    gi++;
  }

  const network = new vis.Network(container, { nodes: new vis.DataSet(data.nodes), edges: new vis.DataSet(data.edges) }, options);
  document.getElementById('stat').textContent = data.nodes.length + ' 节点 / ' + data.edges.length + ' 边';
})();
</script>
</body>
</html>
